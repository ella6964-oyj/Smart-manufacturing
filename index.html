<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>총괄생산계획 최적화</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f5f2ee;
  --card:#fffef9;
  --card2:#f9f7f3;
  --border:#e6e1d8;
  --border2:#d4cec3;
  --txt:#2d2a24;
  --txt2:#7a7060;
  --txt3:#b0a898;
  --blue:#a8c4e0;
  --blue-d:#5a8fb5;
  --blue-bg:#eef4fa;
  --green:#b0d4b8;
  --green-d:#4e9460;
  --green-bg:#eef7f0;
  --pink:#e8b4c4;
  --pink-d:#b55474;
  --pink-bg:#faeef2;
  --yellow:#e8d8a0;
  --yellow-d:#9a7c20;
  --yellow-bg:#faf6e8;
  --purple:#c8b8e8;
  --purple-d:#6e52b8;
  --teal:#a8d4cc;
  --teal-d:#3a8c7e;
  --sidebar:272px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);font-size:12px;line-height:1.4}

.layout{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:42px 1fr;height:100vh}

/* topbar */
.topbar{grid-column:1/-1;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px}
.topbar-title{font-size:13px;font-weight:500;color:var(--txt)}
.topbar-badge{font-size:10px;color:var(--txt3);background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-family:'IBM Plex Mono',monospace}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.run-btn{padding:5px 14px;background:var(--blue-d);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
.run-btn:hover{opacity:.8}
.pill{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:20px;display:none}
.pill.ok{background:var(--green-bg);color:var(--green-d);border:1px solid var(--green);display:inline-block}
.pill.err{background:var(--pink-bg);color:var(--pink-d);border:1px solid var(--pink);display:inline-block}

/* sidebar */
.sidebar{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;font-size:11px}
.s-sec{padding:9px 12px;border-bottom:1px solid var(--border)}
.s-lbl{font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.field{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.field label{font-size:10px;color:var(--txt2);width:116px;flex-shrink:0;line-height:1.3}
.field input,.field select{flex:1;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--txt);font-size:11px;font-family:inherit;min-width:0;transition:border .1s}
.field input:focus,.field select:focus{outline:none;border-color:var(--border2);background:var(--card)}
.demand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:5px}
.d-cell{display:flex;flex-direction:column;align-items:center;gap:1px}
.d-cell .dl{font-size:9px;color:var(--txt3);font-family:'IBM Plex Mono',monospace}
.d-cell input{width:100%;padding:3px 4px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--txt);font-size:10px;text-align:right;font-family:'IBM Plex Mono',monospace}
.d-cell input:focus{outline:none;border-color:var(--border2)}
.d-add{font-size:9px;padding:2px 7px;border:1px dashed var(--border2);border-radius:3px;background:none;cursor:pointer;color:var(--txt3);font-family:inherit}
.d-add:hover{color:var(--txt2);background:var(--card2)}
.toggle{display:flex;gap:3px}
.tog-btn{flex:1;padding:4px;border:1px solid var(--border);border-radius:4px;background:none;font-size:10px;cursor:pointer;color:var(--txt2);font-family:inherit;transition:all .1s}
.tog-btn.on{background:var(--blue-d);color:#fff;border-color:var(--blue-d)}

/* main */
.main{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}

.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.mcard .ml{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.mcard .mv{font-size:17px;font-weight:500;font-family:'IBM Plex Mono',monospace;line-height:1}
.mcard .mu{font-size:9px;color:var(--txt3);margin-left:1px}
.mcard.ok .mv{color:var(--green-d)}
.mcard.warn .mv{color:var(--pink-d)}

/* accent stripe */
.mcard.c-blue{border-top:2px solid var(--blue)}
.mcard.c-green{border-top:2px solid var(--green)}
.mcard.c-pink{border-top:2px solid var(--pink)}
.mcard.c-yellow{border-top:2px solid var(--yellow)}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.ccard .ct{font-size:9px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ccard .ch{position:relative;height:130px}
.leg-row{display:flex;flex-wrap:wrap;gap:7px;margin-left:auto}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--txt3)}
.ld{width:6px;height:6px;border-radius:1px;flex-shrink:0}

/* cost strip */
.cost-strip{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.cs-title{padding:7px 11px;border-bottom:1px solid var(--border);font-size:9px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}
.cs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.cs-item{padding:7px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cs-item:nth-child(4n){border-right:none}
.cs-item:nth-last-child(-n+4){border-bottom:none}
.cs-lbl{font-size:9px;color:var(--txt3);margin-bottom:2px}
.cs-val{font-size:12px;font-weight:500;font-family:'IBM Plex Mono',monospace;color:var(--txt)}

/* table */
.tcard{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.th-row{padding:7px 11px;border-bottom:1px solid var(--border);font-size:9px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:4px 8px;text-align:right;font-weight:500;color:var(--txt3);border-bottom:1px solid var(--border);background:var(--card2);white-space:nowrap;font-size:9px}
th:first-child{text-align:left;padding-left:11px}
td{padding:3px 8px;text-align:right;border-bottom:1px solid var(--border);color:var(--txt2);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
td:first-child{text-align:left;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:var(--txt);padding-left:11px;font-size:10px}
tr:last-child td{border-bottom:none}
.tw{color:var(--yellow-d)}
.td{color:var(--pink-d)}

.empty{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:6px}
.ei{font-size:24px;opacity:.2}
.et{font-size:11px;color:var(--txt3)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="layout">

<header class="topbar">
  <span class="topbar-title">총괄생산계획 최적화</span>
  <span class="topbar-badge">APP · 원예장비</span>
  <div class="topbar-r">
    <span id="pill" class="pill"></span>
  </div>
</header>

<aside class="sidebar">
  <div class="s-sec">
    <div class="s-lbl">모델</div>
    <div class="toggle">
      <button class="tog-btn on" id="btn-lp" onclick="setT('LP')">LP 연속</button>
      <button class="tog-btn" id="btn-ip" onclick="setT('IP')">IP 정수</button>
    </div>
  </div>
  <div class="s-sec">
    <div class="s-lbl">월별 수요 <button class="d-add" onclick="addM()">+ 월</button></div>
    <div class="demand-grid" id="dgrid"></div>
  </div>
  <div class="s-sec">
    <div class="s-lbl">초기값</div>
    <div class="field"><label>초기 재고 I₀ (개)</label><input type="number" id="I0" value="1000"></div>
    <div class="field"><label>최종 목표재고 (개)</label><input type="number" id="Ie" value="500"></div>
    <div class="field"><label>초기 종업원 W₀ (명)</label><input type="number" id="W0" value="80"></div>
    <div class="field"><label>표준시간 (h/개)</label><input type="number" id="std" value="4" step="0.5"></div>
  </div>
  <div class="s-sec">
    <div class="s-lbl">비용 파라미터</div>
    <div class="field"><label>정규임금 (원/h)</label><input type="number" id="reg" value="4000"></div>
    <div class="field"><label>초과임금 (원/h)</label><input type="number" id="otw" value="6000"></div>
    <div class="field"><label>고용비 (천원/인)</label><input type="number" id="hire" value="300"></div>
    <div class="field"><label>해고비 (천원/인)</label><input type="number" id="fire" value="500"></div>
    <div class="field"><label>재고유지비 (천원/개)</label><input type="number" id="inv" value="2"></div>
    <div class="field"><label>부재고비 (천원/개)</label><input type="number" id="back" value="5"></div>
    <div class="field"><label>재료비 (천원/개)</label><input type="number" id="mat" value="10"></div>
    <div class="field"><label>하청비 (천원/개)</label><input type="number" id="sub" value="30"></div>
  </div>
  <div class="s-sec">
    <div class="s-lbl">작업</div>
    <div class="field"><label>작업일수 (일/월)</label><input type="number" id="days" value="20"></div>
    <div class="field"><label>작업시간 (h/일)</label><input type="number" id="hrs" value="8"></div>
    <div class="field"><label>초과시간 제한 (h/인)</label><input type="number" id="otl" value="10"></div>
  </div>
  <div class="s-sec">
    <button class="run-btn" onclick="run()" style="width:100%;padding:8px;font-size:12px;border-radius:6px">▶ 최적화 실행</button>
  </div>
</aside>

<main class="main" id="main">
  <div class="empty"><div class="ei">📋</div><div class="et">파라미터 확인 후 실행하세요</div></div>
</main>

</div>
<script>
let D=[1600,3000,3200,3800,2200,2200],mtype='LP',CH={};

function setT(t){mtype=t;document.getElementById('btn-lp').classList.toggle('on',t==='LP');document.getElementById('btn-ip').classList.toggle('on',t==='IP');}

function rdg(){
  const c=document.getElementById('dgrid');c.innerHTML='';
  D.forEach((d,i)=>{
    const el=document.createElement('div');el.className='d-cell';
    el.innerHTML=`<span class="dl">${i+1}월</span><input type="number" value="${d}" min="0" onchange="D[${i}]=Math.max(0,+this.value)">`;
    c.appendChild(el);
  });
}
function addM(){if(D.length<12){D.push(2000);rdg();}}
rdg();

function gv(id){return parseFloat(document.getElementById(id).value)||0;}
function fm(v){return Math.round(v).toLocaleString('ko-KR');}

function simplex(c,Aub,bub,Aeq,beq){
  const n=c.length,mu=Aub.length,me=Aeq.length,BIG=1e8,nv=n+mu+me,nm=mu+me;
  let tab=[];
  for(let i=0;i<mu;i++){let r=new Array(nv+1).fill(0);for(let j=0;j<n;j++)r[j]=Aub[i][j];r[n+i]=1;r[nv]=bub[i];tab.push(r);}
  for(let i=0;i<me;i++){let r=new Array(nv+1).fill(0);for(let j=0;j<n;j++)r[j]=Aeq[i][j];r[n+mu+i]=1;r[nv]=beq[i];tab.push(r);}
  let ob=new Array(nv+1).fill(0);
  for(let j=0;j<n;j++)ob[j]=c[j];
  for(let j=n+mu;j<nv;j++)ob[j]=BIG;
  tab.push(ob);
  const bs=[];for(let i=0;i<mu;i++)bs.push(n+i);for(let i=0;i<me;i++)bs.push(n+mu+i);
  for(let i=mu;i<nm;i++){const r=tab[i];for(let j=0;j<=nv;j++)tab[nm][j]-=BIG*r[j];}
  for(let it=0;it<3000;it++){
    let pv=-1;for(let j=0;j<nv;j++)if(tab[nm][j]<-1e-7){pv=j;break;}
    if(pv<0)break;
    let lr=-1,mr=Infinity;
    for(let i=0;i<nm;i++)if(tab[i][pv]>1e-8){const r=tab[i][nv]/tab[i][pv];if(r<mr){mr=r;lr=i;}}
    if(lr<0)return null;
    bs[lr]=pv;const p=tab[lr][pv];
    for(let j=0;j<=nv;j++)tab[lr][j]/=p;
    for(let i=0;i<=nm;i++){if(i===lr)continue;const f=tab[i][pv];if(Math.abs(f)<1e-12)continue;for(let j=0;j<=nv;j++)tab[i][j]-=f*tab[lr][j];}
  }
  const x=new Array(n).fill(0);for(let i=0;i<nm;i++)if(bs[i]<n)x[bs[i]]=Math.max(0,tab[i][nv]);
  return{x};
}

function solve(demand,p,ip){
  const T=demand.length,nv=8*T;
  const iv=(t,off)=>off+T*(t>0?{W:0,H:1,L:2,P:3,I:4,S:5,C:6,O:7}[t[0]]:0)+(+t.slice(1)||0)-1;
  // simpler index
  const I=(type,t)=>{const o={W:0,H:1,L:2,P:3,I:4,S:5,C:6,O:7};return o[type]*T+(t-1);};
  const rc=p.reg*p.hrs*p.days/1000,oc=p.otw/1000,uc=p.hrs*p.days/p.std;
  const co=new Array(nv).fill(0);
  for(let t=1;t<=T;t++){co[I('W',t)]+=rc;co[I('O',t)]+=oc;co[I('H',t)]+=p.hire;co[I('L',t)]+=p.fire;co[I('I',t)]+=p.inv;co[I('S',t)]+=p.back;co[I('P',t)]+=p.mat;co[I('C',t)]+=p.sub;}
  const Au=[],bu=[],Ae=[],be=[];
  for(let t=1;t<=T;t++){const r=new Array(nv).fill(0);r[I('P',t)]=1;r[I('W',t)]=-uc;r[I('O',t)]=-1/p.std;Au.push(r);bu.push(0);}
  for(let t=1;t<=T;t++){const r=new Array(nv).fill(0);r[I('O',t)]=1;r[I('W',t)]=-p.otl;Au.push(r);bu.push(0);}
  {const r=new Array(nv).fill(0);r[I('I',T)]=-1;Au.push(r);bu.push(-p.Ie);}
  for(let t=1;t<=T;t++){const r=new Array(nv).fill(0);r[I('W',t)]=1;r[I('H',t)]=-1;r[I('L',t)]=1;if(t>1)r[I('W',t-1)]=-1;Ae.push(r);be.push(t===1?p.W0:0);}
  for(let t=1;t<=T;t++){const r=new Array(nv).fill(0);r[I('I',t)]=1;r[I('P',t)]=-1;r[I('C',t)]=-1;r[I('S',t)]=1;if(t>1){r[I('I',t-1)]=-1;r[I('S',t-1)]=-1;}Ae.push(r);be.push(t===1?p.I0-demand[0]:-demand[t-1]);}
  {const r=new Array(nv).fill(0);r[I('S',T)]=1;Ae.push(r);be.push(0);}
  const res=simplex(co,Au,bu,Ae,be);if(!res)return null;
  const x=res.x,rn=v=>Math.max(0,Math.round(v));
  const get=(type,t)=>ip?rn(x[I(type,t)]):Math.max(0,x[I(type,t)]);
  const W=[p.W0,...Array.from({length:T},(_,i)=>get('W',i+1))];
  const H=[null,...Array.from({length:T},(_,i)=>get('H',i+1))];
  const L=[null,...Array.from({length:T},(_,i)=>get('L',i+1))];
  const P=[null,...Array.from({length:T},(_,i)=>get('P',i+1))];
  const Iv=[p.I0,...Array.from({length:T},(_,i)=>get('I',i+1))];
  const S=[0,...Array.from({length:T},(_,i)=>get('S',i+1))];
  const C=[null,...Array.from({length:T},(_,i)=>get('C',i+1))];
  const O=[null,...Array.from({length:T},(_,i)=>get('O',i+1))];
  const cs={labor:0,overtime:0,hiring:0,layoff:0,inventory:0,backlog:0,material:0,subcontract:0};
  for(let t=1;t<=T;t++){cs.labor+=rc*(W[t]||0);cs.overtime+=oc*(O[t]||0);cs.hiring+=p.hire*(H[t]||0);cs.layoff+=p.fire*(L[t]||0);cs.inventory+=p.inv*(Iv[t]||0);cs.backlog+=p.back*(S[t]||0);cs.material+=p.mat*(P[t]||0);cs.subcontract+=p.sub*(C[t]||0);}
  return{W,H,L,P,I:Iv,S,C,O,D:demand,cost:Object.values(cs).reduce((a,b)=>a+b,0),cs,T,p};
}

function run(){
  document.querySelectorAll('#dgrid input').forEach((el,i)=>{D[i]=Math.max(0,+el.value);});
  const p={I0:gv('I0'),Ie:gv('Ie'),W0:gv('W0'),std:gv('std'),reg:gv('reg'),otw:gv('otw'),hire:gv('hire'),fire:gv('fire'),inv:gv('inv'),back:gv('back'),mat:gv('mat'),sub:gv('sub'),days:gv('days'),hrs:gv('hrs'),otl:gv('otl')};
  const pill=document.getElementById('pill');
  const r=solve(D,p,mtype==='IP');
  if(!r){pill.className='pill err';pill.textContent='최적해 없음';return;}
  pill.className='pill ok';pill.textContent=`${fm(r.cost)} 천원`;
  draw(r,p);
}

function draw(r,p){
  Object.values(CH).forEach(c=>c.destroy());CH={};
  const L=Array.from({length:r.T},(_,i)=>`${i+1}월`);
  const tb=r.S.slice(1).reduce((a,b)=>a+b,0);
  const cn={labor:'정규노동',overtime:'초과노동',hiring:'고용',layoff:'해고',inventory:'재고유지',backlog:'부재고',material:'재료비',subcontract:'하청'};
  const PAL=['#a8c4e0','#c8b8e8','#b0d4b8','#e8b4c4','#e8d8a0','#a8d4cc','#d4c0a8','#c8d4a0'];

  document.getElementById('main').innerHTML=`
  <div class="row4">
    <div class="mcard c-blue"><div class="ml">총 최소비용</div><div class="mv">${fm(r.cost)}<span class="mu">천원</span></div></div>
    <div class="mcard c-yellow"><div class="ml">계획 기간</div><div class="mv">${r.T}<span class="mu">개월</span></div></div>
    <div class="mcard c-green"><div class="ml">최대 종업원</div><div class="mv">${fm(Math.max(...r.W.slice(1)))}<span class="mu">명</span></div></div>
    <div class="mcard c-pink ${tb>0?'warn':'ok'}"><div class="ml">누적 부재고</div><div class="mv">${fm(tb)}<span class="mu">개</span></div></div>
  </div>

  <div class="row2">
    <div class="ccard">
      <div class="ct">수요 vs 생산
        <div class="leg-row">
          <span class="leg"><span class="ld" style="background:#6a7060"></span>수요</span>
          <span class="leg"><span class="ld" style="background:#a8c4e0"></span>생산</span>
          <span class="leg"><span class="ld" style="background:#e8d8a0"></span>하청</span>
        </div>
      </div>
      <div class="ch"><canvas id="c1" role="img" aria-label="수요 대비 생산량 차트"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ct">재고 추이
        <div class="leg-row">
          <span class="leg"><span class="ld" style="background:#a8d4cc"></span>재고</span>
          <span class="leg"><span class="ld" style="background:#e8b4c4"></span>부재고</span>
        </div>
      </div>
      <div class="ch"><canvas id="c2" role="img" aria-label="재고 및 부재고 추이"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ct">인력 계획
        <div class="leg-row">
          <span class="leg"><span class="ld" style="background:#c8b8e8"></span>종업원</span>
          <span class="leg"><span class="ld" style="background:#b0d4b8"></span>고용</span>
          <span class="leg"><span class="ld" style="background:#e8b4c4"></span>해고</span>
        </div>
      </div>
      <div class="ch"><canvas id="c3" role="img" aria-label="인력 계획 차트"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ct">비용 구성</div>
      <div class="ch"><canvas id="c4" role="img" aria-label="비용 구성 도넛 차트"></canvas></div>
    </div>
  </div>

  <div class="cost-strip">
    <div class="cs-title">비용 구성 상세 <span style="font-weight:400;color:var(--txt3)">단위: 천원</span></div>
    <div class="cs-grid">
      ${Object.entries(r.cs).map(([k,v])=>`<div class="cs-item"><div class="cs-lbl">${cn[k]}</div><div class="cs-val">${fm(v)}</div></div>`).join('')}
    </div>
  </div>

  <div class="tcard">
    <div class="th-row">월별 계획 상세</div>
    <div class="tscroll">
      <table>
        <thead><tr><th>항목</th>${L.map(l=>`<th>${l}</th>`).join('')}</tr></thead>
        <tbody>
          <tr><td>수요 D</td>${r.D.map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>종업원 W</td>${r.W.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>고용 H</td>${r.H.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>해고 L</td>${r.L.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>생산 P</td>${r.P.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>재고 I</td>${r.I.slice(1).map(v=>`<td class="${v<200?'tw':''}">${fm(v)}</td>`).join('')}</tr>
          <tr><td>부재고 S</td>${r.S.slice(1).map(v=>`<td class="${v>0?'td':''}">${fm(v)}</td>`).join('')}</tr>
          <tr><td>하청 C</td>${r.C.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
          <tr><td>잔업 O</td>${r.O.slice(1).map(v=>`<td>${fm(v)}</td>`).join('')}</tr>
        </tbody>
      </table>
    </div>
  </div>
  `;

  const tf={size:9};const nl={legend:{display:false}};
  setTimeout(()=>{
    CH.c1=new Chart(document.getElementById('c1'),{
      type:'bar',
      data:{labels:L,datasets:[
        {label:'수요',data:r.D,type:'line',borderColor:'#6a7060',borderWidth:1.5,tension:.3,pointRadius:2,fill:false,borderDash:[3,3],order:0},
        {label:'생산',data:r.P.slice(1).map(v=>Math.round(v)),backgroundColor:'rgba(168,196,224,.7)',order:1},
        {label:'하청',data:r.C.slice(1).map(v=>Math.round(v)),backgroundColor:'rgba(232,216,160,.8)',order:2},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:nl,scales:{x:{ticks:{font:tf}},y:{beginAtZero:true,ticks:{font:tf,callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}}}}
    });
    CH.c2=new Chart(document.getElementById('c2'),{
      type:'line',
      data:{labels:L,datasets:[
        {label:'재고',data:r.I.slice(1).map(v=>Math.round(v)),borderColor:'#5aaa9a',backgroundColor:'rgba(168,212,204,.2)',fill:true,tension:.35,pointRadius:2},
        {label:'부재고',data:r.S.slice(1).map(v=>Math.round(v)),borderColor:'#c87890',backgroundColor:'rgba(232,180,196,.2)',fill:true,tension:.35,pointRadius:2,borderDash:[3,3]},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:nl,scales:{y:{beginAtZero:true,ticks:{font:tf}},x:{ticks:{font:tf}}}}
    });
    CH.c3=new Chart(document.getElementById('c3'),{
      type:'bar',
      data:{labels:L,datasets:[
        {label:'종업원',data:r.W.slice(1).map(v=>Math.round(v)),type:'line',borderColor:'#9878d0',backgroundColor:'rgba(200,184,232,.15)',fill:true,tension:.3,pointRadius:2,yAxisID:'y',order:0},
        {label:'고용',data:r.H.slice(1).map(v=>Math.round(v)),backgroundColor:'rgba(176,212,184,.8)',yAxisID:'y2',order:1},
        {label:'해고',data:r.L.slice(1).map(v=>Math.round(v)),backgroundColor:'rgba(232,180,196,.8)',yAxisID:'y2',order:2},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:nl,scales:{x:{ticks:{font:tf}},y:{position:'left',ticks:{font:tf}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:tf}}}}
    });
    CH.c4=new Chart(document.getElementById('c4'),{
      type:'doughnut',
      data:{labels:Object.keys(r.cs).map(k=>cn[k]),datasets:[{data:Object.values(r.cs).map(v=>Math.round(v)),backgroundColor:PAL,borderWidth:0,hoverOffset:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:7,padding:4}}}}
    });
  },40);
}

setTimeout(()=>run(),80);
</script>
</body>
</html>
